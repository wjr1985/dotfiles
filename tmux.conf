# ── tpm (Tmux Plugin Manager) ─────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'erikw/tmux-powerline'

# ── Prefix ────────────────────────────────────────────────────────
# Keep default Ctrl-b as prefix
set -g prefix C-b

# ── General ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── Mouse ─────────────────────────────────────────────────────────
set -g mouse on

# ── Color scheme (Nord-inspired) ─────────────────────────────────
# Pane borders
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"

# Message / command line
set -g message-style "bg=#3b4252,fg=#d8dee9"

# Window styles
setw -g window-status-style "fg=#4c566a,bg=default"
setw -g window-status-current-style "fg=#88c0d0,bg=#3b4252,bold"

# ── Status bar with keyboard shortcut hints ──────────────────────
set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=#2e3440,fg=#d8dee9"

# Status left/right managed by tmux-powerline (set at bottom of file)

# Window list format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator ""

# ── Window shortcuts (all use prefix C-b first) ──────────────────
# These are defaults but listed for clarity:
#   C-b c       → new window
#   C-b n       → next window
#   C-b p       → previous window
#   C-b 1-9     → jump to window
#   C-b ,       → rename window
#   C-b &       → close window
#   C-b %       → split vertical
#   C-b "       → split horizontal

# ── Quality-of-life bindings ──────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Easier splits that mirror the direction
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Initialize tpm — must be last line (main.tmux sets status-left/right/lengths)
run '~/.tmux/plugins/tpm/tpm'
