# ── Prefix ────────────────────────────────────────────────────────
# Keep default Ctrl-b as prefix
set -g prefix C-b

# ── General ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── Mouse ─────────────────────────────────────────────────────────
# Pass mouse control through to the running program
set -g mouse on

# ── Color scheme (Nord-inspired) ─────────────────────────────────
# Pane borders
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"

# Message / command line
set -g message-style "bg=#3b4252,fg=#d8dee9"

# Window styles
setw -g window-status-style "fg=#4c566a,bg=default"
setw -g window-status-current-style "fg=#88c0d0,bg=#3b4252,bold"

# ── Status bar with keyboard shortcut hints ──────────────────────
set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=#2e3440,fg=#d8dee9"

# Left: show prefix indicator — lights up when prefix is active
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=#bf616a fg=#2e3440 bold] C-b #[default],#[bg=#3b4252 fg=#616e88] C-b #[default]} #[fg=#a3be8c bold]#S #[default]"

# Right: keyboard shortcut hints focused on window operations
set -g status-right-length 120
set -g status-right "#[fg=#616e88]c:new #[fg=#4c566a]│#[fg=#616e88] n/p:next/prev #[fg=#4c566a]│#[fg=#616e88] 1-9:jump #[fg=#4c566a]│#[fg=#616e88] ,:rename #[fg=#4c566a]│#[fg=#616e88] &:close #[fg=#4c566a]│#[fg=#616e88] %/\":split #[fg=#4c566a]│ #[fg=#d8dee9]%H:%M:%S"

# Window list format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator ""

# ── Window shortcuts (all use prefix C-b first) ──────────────────
# These are defaults but listed for clarity:
#   C-b c       → new window
#   C-b n       → next window
#   C-b p       → previous window
#   C-b 1-9     → jump to window
#   C-b ,       → rename window
#   C-b &       → close window
#   C-b %       → split vertical
#   C-b "       → split horizontal

# ── Quality-of-life bindings ──────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Easier splits that mirror the direction
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"
